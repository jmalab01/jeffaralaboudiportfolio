<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <!-- Background -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#080c18"/>
      <stop offset="100%" stop-color="#0d1635"/>
    </linearGradient>
    <!-- Main accent gradient (horizontal) -->
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#6564DB"/>
      <stop offset="60%"  stop-color="#3a3fc7"/>
      <stop offset="100%" stop-color="#89D2DC"/>
    </linearGradient>
    <!-- Vertical accent for left stripe -->
    <linearGradient id="stripe" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6564DB"/>
      <stop offset="100%" stop-color="#89D2DC"/>
    </linearGradient>
    <!-- Card bg -->
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#141d36"/>
      <stop offset="100%" stop-color="#0f1628"/>
    </linearGradient>
    <!-- Glow filter for headline -->
    <filter id="glow" x="-5%" y="-30%" width="110%" height="160%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Drop shadow for cards -->
    <filter id="shadow" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="#6564DB" flood-opacity="0.28"/>
    </filter>
    <!-- Dot grid pattern -->
    <pattern id="grid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="1.5" cy="1.5" r="1.2" fill="#6564DB" fill-opacity="0.07"/>
    </pattern>
    <!-- Clip path for left panel -->
    <clipPath id="lp"><rect width="410" height="630"/></clipPath>
  </defs>

  <!-- ── BASE ── -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <!-- ── ATMOSPHERE BLOBS ── -->
  <ellipse cx="1090" cy="80"  rx="360" ry="220" fill="#3a3fc7" fill-opacity="0.09"/>
  <ellipse cx="120"  cy="560" rx="280" ry="190" fill="#6564DB" fill-opacity="0.11"/>
  <ellipse cx="640"  cy="315" rx="400" ry="260" fill="#6564DB" fill-opacity="0.03"/>

  <!-- Decorative rings top-right -->
  <circle cx="1110" cy="0"   r="310" fill="none" stroke="#89D2DC" stroke-width="1" stroke-opacity="0.07"/>
  <circle cx="1110" cy="0"   r="230" fill="none" stroke="#89D2DC" stroke-width="1" stroke-opacity="0.05"/>
  <!-- Decorative rings bottom-left -->
  <circle cx="90"   cy="630" r="290" fill="none" stroke="#6564DB" stroke-width="1" stroke-opacity="0.07"/>
  <circle cx="90"   cy="630" r="210" fill="none" stroke="#6564DB" stroke-width="1" stroke-opacity="0.05"/>

  <!-- ── LEFT PANEL ── -->
  <rect width="410" height="630" fill="#6564DB" fill-opacity="0.11"/>
  <rect width="410" height="630" fill="url(#grid)" fill-opacity="0.4" clip-path="url(#lp)"/>
  <!-- right edge shimmer -->
  <rect x="408" y="0" width="3" height="630" fill="url(#stripe)" opacity="0.55"/>

  <!-- Avatar circle -->
  <circle cx="205" cy="222" r="92" fill="none" stroke="url(#accent)" stroke-width="3.5" filter="url(#shadow)"/>
  <circle cx="205" cy="222" r="85" fill="#111827"/>
  <!-- Monogram JA -->
  <text x="205" y="244"
    text-anchor="middle"
    font-family="'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="58" font-weight="800"
    fill="url(#accent)" filter="url(#glow)">JA</text>

  <!-- Name + rule + role -->
  <text x="205" y="350"
    text-anchor="middle"
    font-family="'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="19" font-weight="700" letter-spacing="2.8"
    fill="#ffffff">JEFFAR ALABOUDI</text>
  <rect x="95" y="361" width="220" height="2.5" rx="1.5" fill="url(#accent)"/>
  <text x="205" y="389"
    text-anchor="middle"
    font-family="'Segoe UI', Helvetica, Arial, sans-serif"
    font-size="12.5" font-weight="400" letter-spacing="1.8"
    fill="#89D2DC">BUSINESS &amp; SYSTEMS ANALYST</text>

  <!-- Skill badges row 1 -->
  <rect x="58"  y="416" width="82"  height="26" rx="13" fill="#6564DB" fill-opacity="0.22" stroke="#6564DB" stroke-width="1.2"/>
  <text x="99"  y="433" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#c4c3f7" letter-spacing="0.4">Python</text>

  <rect x="150" y="416" width="62"  height="26" rx="13" fill="#3a3fc7" fill-opacity="0.28" stroke="#3a3fc7" stroke-width="1.2"/>
  <text x="181" y="433" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#b0b6f8" letter-spacing="0.4">SQL</text>

  <rect x="222" y="416" width="96"  height="26" rx="13" fill="#6564DB" fill-opacity="0.16" stroke="#6564DB" stroke-width="1.2"/>
  <text x="270" y="433" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#c4c3f7" letter-spacing="0.4">JavaScript</text>

  <!-- Skill badges row 2 -->
  <rect x="84"  y="452" width="88"  height="26" rx="13" fill="#89D2DC" fill-opacity="0.13" stroke="#89D2DC" stroke-width="1.2"/>
  <text x="128" y="469" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#89D2DC" letter-spacing="0.4">Power BI</text>

  <rect x="182" y="452" width="105" height="26" rx="13" fill="#3a3fc7" fill-opacity="0.2" stroke="#3a3fc7" stroke-width="1.2"/>
  <text x="234" y="469" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11.5" fill="#b0b6f8" letter-spacing="0.4">Cybersecurity</text>

  <!-- UofL footer in panel -->
  <text x="205" y="548"
    text-anchor="middle"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="11.5" letter-spacing="1" fill="rgba(255,255,255,0.28)">UNIVERSITY OF LOUISVILLE</text>
  <text x="205" y="568"
    text-anchor="middle"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="10.5" letter-spacing="0.4" fill="rgba(255,255,255,0.17)">Computer Information Systems</text>

  <!-- ── RIGHT SECTION ── -->
  <!-- Top accent bar -->
  <rect x="430" y="0" width="770" height="5" fill="url(#accent)"/>

  <!-- "PORTFOLIO" eyebrow -->
  <text x="460" y="64"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="11.5" font-weight="700" letter-spacing="6"
    fill="#6564DB">PORTFOLIO</text>

  <!-- Main headline -->
  <text x="460" y="155"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="66" font-weight="800" letter-spacing="-1.5"
    fill="#ffffff" filter="url(#glow)">Hello, I'm</text>
  <text x="460" y="238"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="66" font-weight="800" letter-spacing="-1.5"
    fill="url(#accent)" filter="url(#glow)">Jeffar Alaboudi</text>

  <!-- Sub-headline -->
  <text x="462" y="280"
    font-family="'Segoe UI',Arial,sans-serif"
    font-size="19" font-weight="300" letter-spacing="0.3"
    fill="rgba(255,255,255,0.58)">Business Analyst · Systems Analyst · CIS Graduate</text>

  <!-- Thin divider -->
  <rect x="460" y="303" width="695" height="1" fill="rgba(101,100,219,0.28)"/>

  <!-- ── STAT CARDS ── -->
  <rect x="460" y="323" width="186" height="100" rx="14" fill="url(#card)" stroke="#6564DB" stroke-width="1.3" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="553" y="374" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="800" fill="url(#accent)">20+</text>
  <text x="553" y="404" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.42)" letter-spacing="1.8">PROJECTS</text>

  <rect x="659" y="323" width="186" height="100" rx="14" fill="url(#card)" stroke="#6564DB" stroke-width="1.3" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="752" y="374" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="800" fill="url(#accent)">32+</text>
  <text x="752" y="404" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.42)" letter-spacing="1.8">SKILLS</text>

  <rect x="858" y="323" width="224" height="100" rx="14" fill="url(#card)" stroke="#6564DB" stroke-width="1.3" stroke-opacity="0.5" filter="url(#shadow)"/>
  <text x="970" y="374" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="40" font-weight="800" fill="url(#accent)">500+</text>
  <text x="970" y="404" text-anchor="middle" font-family="'Segoe UI',Arial,sans-serif" font-size="11" fill="rgba(255,255,255,0.42)" letter-spacing="1.8">HOURS EXP.</text>

  <!-- ── BOTTOM INFO BAR ── -->
  <rect x="430" y="452" width="770" height="178" fill="#07091a" fill-opacity="0.72"/>
  <rect x="430" y="452" width="770" height="1.5" fill="rgba(101,100,219,0.22)"/>

  <!-- Vertical accent rule -->
  <rect x="460" y="472" width="3" height="78" rx="1.5" fill="url(#stripe)"/>

  <!-- Description text -->
  <text x="478" y="502" font-family="'Segoe UI',Arial,sans-serif" font-size="15" font-weight="600" fill="rgba(255,255,255,0.78)" letter-spacing="0.3">CIS 495 Senior Capstone Portfolio</text>
  <text x="478" y="526" font-family="'Segoe UI',Arial,sans-serif" font-size="13" font-weight="300" fill="rgba(255,255,255,0.36)" letter-spacing="0.2">Business analysis · Cybersecurity · Data analytics · Systems design</text>

  <!-- Dots + URL -->
  <circle cx="460" cy="558" r="5"   fill="#6564DB"/>
  <circle cx="475" cy="558" r="5"   fill="#3a3fc7"/>
  <circle cx="490" cy="558" r="5"   fill="#89D2DC"/>
  <text x="507" y="563" font-family="'Segoe UI',Arial,sans-serif" font-size="13.5" fill="rgba(255,255,255,0.3)" letter-spacing="0.3">jmalab01.github.io/jeffaralaboudiportfolio</text>

  <!-- Bottom accent bar -->
  <rect x="430" y="625" width="770" height="5" fill="url(#accent)"/>
</svg>
